<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RV School — Chatbot</title>
  <link rel="stylesheet" href="index.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
  <!-- This represents your actual website content -->
  <div style="padding: 40px; text-align: center; color: #555;">
    <h1>Welcome to RV School</h1>
    <p>This is a mock website page. The chatbot widget is in the bottom right corner!</p>
  </div>

  <!-- Floating Launcher -->
  <button class="chat-launcher" id="chatLauncher" title="Chat with us!">
    💬
  </button>

  <!-- Chat Widget -->
  <div class="chat-widget" id="chatWidget">
    <div class="chat-header">
      <div class="header-info">
        <h2 id="chatSchoolName">RV School</h2>
        <div class="status"><span class="dot"></span> Online</div>
      </div>
      <div class="header-actions">
        <button id="clearChatBtn" title="Clear chat">🔄</button>
        <button id="closeChatBtn" title="Close chat">✖</button>
      </div>
    </div>
    <div class="chat-body" id="chatBody">
      <div class="chat-container" id="chatContainer"></div>
    </div>
    <div class="chat-input-area" style="position: relative;">
      <div class="quick-suggestions" id="quickSuggestions">
        <button class="suggestion-chip" data-query="menu">📋 Menu</button>
        <button class="suggestion-chip" data-query="admissions">📚 Admissions</button>
        <button class="suggestion-chip" data-query="fees">💰 Fees</button>
      </div>
      <div id="typeahead" class="typeahead-container hidden"></div>
      <div class="chat-input-wrapper">
        <button id="micBtn" class="mic-btn" title="Voice Search">🎤</button>
        <input type="text" id="chatInput" placeholder="Type a message…" autocomplete="off" />
        <button class="send-btn" id="sendBtn" title="Send">➤</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
